<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Infinity Ramper Shops</title>
<link rel="stylesheet" href="/assets/branding.css">
<style>
  /* ---- Landing (logged-out) layout ---- */
  .landing {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr 1fr;
  }
  .landing-hero {
    background: var(--bg-warm);
    padding: 60px 56px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    border-right: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }
  .landing-hero h1 {
    font-family: 'Funnel Display', serif;
    font-weight: 400;
    font-size: clamp(40px, 5.5vw, 64px);
    letter-spacing: -0.04em;
    line-height: 1.0;
    margin: 0;
    color: var(--ink);
  }
  .landing-hero h1 em {
    font-style: italic;
    font-weight: 300;
    color: var(--accent);
    letter-spacing: -0.03em;
  }
  .landing-hero .lead {
    color: var(--ink-mid);
    max-width: 440px;
    font-size: 15px;
    line-height: 1.55;
    margin-top: 24px;
  }
  .landing-hero .brand { margin-bottom: auto; }

  .landing-hero .foot {
    display: flex;
    gap: 32px;
    color: var(--ink-light);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    margin-top: 48px;
  }
  .landing-hero .foot .dot {
    display: inline-block;
    width: 4px; height: 4px; border-radius: 50%;
    background: var(--accent);
    margin-right: 8px;
    animation: pulse 1.6s ease-in-out infinite;
  }

  .landing-form {
    background: var(--bg);
    padding: 60px 56px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .landing-form .wrap {
    max-width: 400px;
    width: 100%;
    margin: 0 auto;
  }

  .landing-form .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    margin-bottom: 28px;
  }
  .landing-form .tab {
    padding: 10px 0;
    margin-right: 28px;
    cursor: pointer;
    color: var(--ink-light);
    font-family: 'Funnel Display', serif;
    font-weight: 500;
    font-size: 13px;
    letter-spacing: -0.005em;
    border-bottom: 1px solid transparent;
    margin-bottom: -1px;
    transition: color 120ms ease;
  }
  .landing-form .tab:hover { color: var(--ink); }
  .landing-form .tab.active {
    color: var(--ink);
    border-bottom-color: var(--accent);
  }

  @media (max-width: 820px) {
    .landing { grid-template-columns: 1fr; }
    .landing-hero {
      padding: 40px 24px;
      border-right: none;
      border-bottom: 1px solid var(--border);
    }
    .landing-form { padding: 40px 24px; }
  }

  /* ---- Onboarding (logged-in) steps ---- */
  .steps-bar {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    background: var(--border);
    gap: 1px;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 28px;
  }
  .step-tile {
    background: var(--bg-warm);
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    transition: background 120ms ease;
  }
  .step-tile .num {
    font-family: 'Funnel Display', serif;
    font-weight: 500;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }
  .step-tile .lbl {
    font-family: 'Funnel Display', serif;
    font-weight: 500;
    font-size: 14px;
    letter-spacing: -0.01em;
    color: var(--ink);
  }
  .step-tile.done .num { color: var(--green); }
  .step-tile.done .lbl { color: var(--ink-mid); }
  .step-tile.current { background: var(--bg); }
  .step-tile.current .num { color: var(--accent); }

  .step-card { margin-bottom: 16px; }
  .step-card.dim { opacity: 0.55; }
  .step-card .head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 16px;
  }
  .step-card .head .title { display: flex; flex-direction: column; gap: 6px; }

  .status-line {
    padding: 10px 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 12px;
    color: var(--ink-mid);
    font-family: 'IBM Plex Mono', monospace;
    margin-top: 12px;
    word-break: break-all;
  }
  .status-line.ok { color: var(--green); border-color: rgba(58, 122, 82, 0.3); }

  .message-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 16px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-all;
    color: var(--ink-mid);
    margin-bottom: 12px;
  }

  .activate-card {
    background: var(--bg-dark);
    color: var(--ink);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 40px 32px;
    text-align: center;
    margin-top: 24px;
  }
  [data-theme='light'] .activate-card {
    background: var(--bg-dark);
    color: #f0ede6;
  }
  .activate-card .display {
    color: #f0ede6;
    font-size: clamp(28px, 3vw, 36px);
  }
  .activate-card .lead {
    color: #888888;
    margin: 12px 0 24px;
  }
</style>
</head>
<body>
<div id="page"></div>

<script src="/assets/shell.js"></script>
<script>
(async () => {
  'use strict';
  const page = document.getElementById('page');

  // If already logged in, check onboarding state
  if (Auth.token) {
    try {
      const me = await API('GET', '/me');
      // Fully active → go straight to dashboard
      if (me.status === 'active') {
        window.location.href = '/dashboard';
        return;
      }
      // Otherwise show guided onboarding
      renderOnboarding(me);
      return;
    } catch {
      Auth.token = null;
      // fall through to landing
    }
  }
  renderLanding();

  // ---------------------------------------------------------------------
  // Landing (logged-out)
  // ---------------------------------------------------------------------
  function renderLanding() {
    page.innerHTML = `
      <div class="landing">
        <section class="landing-hero">
          <a class="brand" href="/">Infinity<em>Ramper</em></a>
          <div>
            <h1>Telegram shops,<br><em>properly engineered.</em></h1>
            <p class="lead">Stand up a complete storefront inside a Telegram bot. Accept card, Apple Pay, bank transfer or crypto. Settle in USDC on Polygon. Non-custodial, transparent, fast.</p>
          </div>
          <div class="foot">
            <span><span class="dot"></span>Service operational</span>
            <span>Polygon · USDC</span>
          </div>
        </section>

        <section class="landing-form">
          <div class="wrap">
            <span class="eyebrow">Merchant access</span>
            <h2 class="display mt-2 mb-3">Sign in to your shop.</h2>

            <div class="tabs">
              <div class="tab active" data-tab="login">Log in</div>
              <div class="tab" data-tab="signup">Create account</div>
            </div>

            <div id="auth-error"></div>

            <form id="loginForm">
              <div class="field">
                <label>Email</label>
                <input type="email" id="loginEmail" required autocomplete="email"/>
              </div>
              <div class="field">
                <label>Password</label>
                <input type="password" id="loginPassword" required autocomplete="current-password"/>
              </div>
              <button class="btn btn-primary" type="submit" style="width:100%">Log in</button>
            </form>

            <form id="signupForm" class="hidden">
              <div class="field">
                <label>Email</label>
                <input type="email" id="signupEmail" required autocomplete="email"/>
              </div>
              <div class="field">
                <label>Password <span class="faint">(min 8 chars)</span></label>
                <input type="password" id="signupPassword" required minlength="8" autocomplete="new-password"/>
              </div>
              <div class="field">
                <label>Store name</label>
                <input type="text" id="signupStoreName" required minlength="2" maxlength="80" placeholder="e.g. North Coast Coffee"/>
              </div>
              <button class="btn btn-primary" type="submit" style="width:100%">Create account</button>
            </form>

            <div class="muted mt-3" style="font-size:12px;">
              By creating an account you agree to operate within Infinity Ramper's acceptable use policy.
            </div>
          </div>
        </section>
      </div>
    `;

    // Tab switching
    page.querySelectorAll('.tab').forEach(t => {
      t.addEventListener('click', () => {
        page.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
        t.classList.add('active');
        const which = t.dataset.tab;
        document.getElementById('loginForm').classList.toggle('hidden', which !== 'login');
        document.getElementById('signupForm').classList.toggle('hidden', which !== 'signup');
        document.getElementById('auth-error').innerHTML = '';
      });
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearAuthError();
      try {
        const r = await API('POST', '/auth/login', {
          email: val('loginEmail'), password: val('loginPassword'),
        });
        Auth.token = r.token;
        const me = await API('GET', '/me');
        window.location.href = me.status === 'active' ? '/dashboard' : '/';
      } catch (err) { authError(err.message); }
    });

    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearAuthError();
      try {
        const r = await API('POST', '/auth/signup', {
          email: val('signupEmail'),
          password: val('signupPassword'),
          store_name: val('signupStoreName'),
        });
        Auth.token = r.token;
        window.location.href = '/'; // re-runs bootstrap → onboarding
      } catch (err) { authError(err.message); }
    });

    function authError(msg) {
      document.getElementById('auth-error').innerHTML =
        `<div class="banner banner-error">${Fmt.escape(msg)}</div>`;
    }
    function clearAuthError() {
      document.getElementById('auth-error').innerHTML = '';
    }
  }

  function val(id) { return document.getElementById(id).value.trim(); }

  // ---------------------------------------------------------------------
  // Onboarding (logged-in, pre-active)
  // ---------------------------------------------------------------------
  function renderOnboarding(me) {
    const main = Shell.render({
      crumbs: [{ label: 'Setup' }],
    });

    main.innerHTML = `
      <div class="page-head">
        <div>
          <span class="eyebrow">First five steps</span>
          <h1 class="display mt-2">Set up your shop.</h1>
          <div class="meta">Connect your bot, your wallet, add a product, then go live. Takes a few minutes.</div>
        </div>
        <div class="actions">
          <a class="btn btn-ghost" href="/dashboard">Skip for now →</a>
        </div>
      </div>

      <div id="steps-bar-wrap"></div>

      <div id="onboarding-body"></div>
    `;

    renderOnboardingState(me);
  }

  async function renderOnboardingState(me) {
    const order = ['bot', 'wallet', 'store', 'products', 'live'];
    const currentIdx = order.indexOf(me.onboarding_step);
    const stepsBar = order.map((step, i) => {
      const labels = { bot: 'Bot', wallet: 'Wallet', store: 'Settings', products: 'Products', live: 'Go live' };
      const state = i < currentIdx ? 'done' : i === currentIdx ? 'current' : '';
      return `<div class="step-tile ${state}">
        <span class="num">Step ${i + 1}</span>
        <span class="lbl">${labels[step]}</span>
      </div>`;
    }).join('');
    document.getElementById('steps-bar-wrap').innerHTML = `<div class="steps-bar">${stepsBar}</div>`;

    const body = document.getElementById('onboarding-body');
    body.innerHTML = `
      ${renderBotCard(me)}
      ${renderWalletCard(me)}
      ${renderStoreCard(me)}
      ${renderProductsCard(me)}
      ${renderActivateCard(me)}
    `;
    wireBotCard(me);
    wireWalletCard(me);
    wireStoreCard(me);
    wireProductsLink();
    wireActivateCard(me);
  }

  // --- Bot card --------------------------------------------------------
  function renderBotCard(me) {
    const connected = Boolean(me.bot_username);
    return `<div class="card step-card">
      <div class="head">
        <div class="title">
          <span class="eyebrow plain">Step 1 · Bot</span>
          <h2 class="display">Connect your Telegram bot.</h2>
          <div class="muted" style="font-size:13px">
            Talk to <a href="https://t.me/BotFather" target="_blank" rel="noopener">@BotFather</a>, use <code>/newbot</code>, and paste the token below. We'll register the webhook.
          </div>
        </div>
        ${connected ? `<span class="badge badge-shipped badge-live">Connected</span>` : ''}
      </div>
      <form id="botForm">
        <div class="field">
          <label>Bot token</label>
          <input type="text" id="botToken" placeholder="1234567890:AAH…" autocomplete="off" ${connected ? 'disabled' : ''}/>
        </div>
        <div class="flex justify-end gap-2">
          ${connected
            ? `<button type="button" class="btn btn-secondary btn-sm" id="botDisconnect">Disconnect</button>`
            : `<button type="submit" class="btn btn-primary btn-sm">Save bot token</button>`}
        </div>
      </form>
      <div id="botStatus" class="status-line ${connected ? 'ok' : ''}">
        ${connected ? `Connected: @${Fmt.escape(me.bot_username)}` : 'Not connected'}
      </div>
    </div>`;
  }

  function wireBotCard(me) {
    const form = document.getElementById('botForm');
    if (form && !me.bot_username) {
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = e.target.querySelector('button[type="submit"]');
        btn.disabled = true;
        try {
          const r = await API('POST', '/onboarding/bot', { bot_token: val('botToken') });
          Toast.ok(`Bot @${r.username} connected`);
          refreshMe();
        } catch (err) { Toast.err(err.message); }
        finally { btn.disabled = false; }
      });
    }
    const dc = document.getElementById('botDisconnect');
    if (dc) {
      dc.addEventListener('click', async () => {
        if (!confirm('Disconnect your bot? Buyers can no longer message it until you reconnect.')) return;
        try {
          await API('POST', '/bot/disconnect');
          Toast.ok('Bot disconnected');
          refreshMe();
        } catch (err) { Toast.err(err.message); }
      });
    }
  }

  // --- Wallet card -----------------------------------------------------
  function renderWalletCard(me) {
    const connected = Boolean(me.payout_wallet);
    const msg = `Verify ownership for Infinity Ramper Shops\n\nMerchant: ${me.id}\nTimestamp: ${Date.now()}`;
    return `<div class="card step-card ${me.bot_username ? '' : 'dim'}">
      <div class="head">
        <div class="title">
          <span class="eyebrow plain">Step 2 · Wallet</span>
          <h2 class="display">Connect your payout wallet.</h2>
          <div class="muted" style="font-size:13px">
            Your Polygon address receives USDC settlements. Optionally sign the message below to verify ownership — recommended.
          </div>
        </div>
        ${connected ? `<span class="badge badge-shipped">Connected</span>` : ''}
      </div>

      <form id="walletForm">
        <div class="field">
          <label>Polygon address</label>
          <input type="text" id="walletAddress" placeholder="0x…" value="${Fmt.escape(me.payout_wallet || '')}" autocomplete="off"/>
        </div>
        <div class="field">
          <label>Message to sign <span class="faint">(optional)</span></label>
          <div class="message-box" id="walletMessageBox">${Fmt.escape(msg)}</div>
        </div>
        <div class="field">
          <label>Signature <span class="faint">(optional — leave blank to skip)</span></label>
          <input type="text" id="walletSignature" placeholder="0x…" autocomplete="off"/>
        </div>
        <div class="flex justify-end">
          <button type="submit" class="btn btn-primary btn-sm">Save wallet</button>
        </div>
      </form>
      <div id="walletStatus" class="status-line ${connected ? 'ok' : ''}">
        ${connected ? `Connected: ${Fmt.escape(me.payout_wallet)}` : 'Not connected'}
      </div>
    </div>`;
  }

  function wireWalletCard(me) {
    const form = document.getElementById('walletForm');
    if (!form) return;
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      btn.disabled = true;
      const sig = val('walletSignature');
      const body = { address: val('walletAddress') };
      if (sig) {
        body.signature = sig;
        body.message = document.getElementById('walletMessageBox').textContent;
      }
      try {
        const r = await API('POST', '/onboarding/wallet', body);
        Toast.ok(r.verified ? 'Wallet verified' : 'Wallet saved (unverified)');
        document.getElementById('walletSignature').value = '';
        refreshMe();
      } catch (err) { Toast.err(err.message); }
      finally { btn.disabled = false; }
    });
  }

  // --- Store settings card ---------------------------------------------
  function renderStoreCard(me) {
    const currencies = ['USD', 'EUR', 'GBP', 'CAD', 'AUD', 'INR'];
    return `<div class="card step-card ${me.payout_wallet ? '' : 'dim'}">
      <div class="head">
        <div class="title">
          <span class="eyebrow plain">Step 3 · Settings</span>
          <h2 class="display">Store currency &amp; notifications.</h2>
          <div class="muted" style="font-size:13px">
            Prices are quoted in your store currency. Your Telegram ID is used for order alerts — get it from
            <a href="https://t.me/userinfobot" target="_blank" rel="noopener">@userinfobot</a>.
          </div>
        </div>
      </div>
      <form id="storeForm">
        <div class="field-row">
          <div class="field">
            <label>Currency</label>
            <select id="storeCurrency">
              ${currencies.map(c => `<option value="${c}" ${c === (me.currency_code || 'USD') ? 'selected' : ''}>${c}</option>`).join('')}
            </select>
          </div>
          <div class="field">
            <label>Your Telegram user ID</label>
            <input type="number" id="adminTelegramId" placeholder="123456789" value="${me.admin_telegram_id || ''}"/>
          </div>
        </div>
        <div class="flex justify-end">
          <button type="submit" class="btn btn-primary btn-sm">Save settings</button>
        </div>
      </form>
    </div>`;
  }

  function wireStoreCard(me) {
    const form = document.getElementById('storeForm');
    if (!form) return;
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      btn.disabled = true;
      try {
        await API('PATCH', '/store', {
          currency_code: val('storeCurrency'),
          admin_telegram_id: Number(val('adminTelegramId')) || undefined,
        });
        Toast.ok('Settings saved');
        refreshMe();
      } catch (err) { Toast.err(err.message); }
      finally { btn.disabled = false; }
    });
  }

  // --- Products card ---------------------------------------------------
  function renderProductsCard(me) {
    return `<div class="card step-card ${me.payout_wallet ? '' : 'dim'}">
      <div class="head">
        <div class="title">
          <span class="eyebrow plain">Step 4 · Products</span>
          <h2 class="display">Add your first product.</h2>
          <div class="muted" style="font-size:13px">
            Name, price, stock. You can add more any time.
          </div>
        </div>
      </div>
      <form id="productForm">
        <div class="field">
          <label>Name</label>
          <input type="text" id="productName" required/>
        </div>
        <div class="field">
          <label>Description <span class="faint">(optional)</span></label>
          <textarea id="productDescription"></textarea>
        </div>
        <div class="field-row">
          <div class="field">
            <label>Price</label>
            <input type="number" id="productPrice" step="0.01" min="0.01" required/>
          </div>
          <div class="field">
            <label>Stock</label>
            <input type="number" id="productStock" min="0" value="10" required/>
          </div>
        </div>
        <div class="field">
          <label>Image URL <span class="faint">(optional)</span></label>
          <input type="url" id="productImage" placeholder="https://…"/>
        </div>
        <div class="flex justify-end gap-2">
          <button type="submit" class="btn btn-primary btn-sm">Add product</button>
        </div>
      </form>
      <div id="productsList" class="mt-3"></div>
    </div>`;
  }

  async function wireProductsLink() {
    const form = document.getElementById('productForm');
    if (!form) return;
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      btn.disabled = true;
      try {
        await API('POST', '/products', {
          name: val('productName'),
          description: document.getElementById('productDescription').value.trim() || undefined,
          price: Number(val('productPrice')),
          stock: Number(val('productStock')),
          image_url: val('productImage') || undefined,
        });
        Toast.ok('Product added');
        form.reset();
        document.getElementById('productStock').value = '10';
        loadProducts();
      } catch (err) { Toast.err(err.message); }
      finally { btn.disabled = false; }
    });
    loadProducts();
  }

  async function loadProducts() {
    const el = document.getElementById('productsList');
    if (!el) return;
    try {
      const products = await API('GET', '/products');
      if (!products.length) {
        el.innerHTML = '';
        return;
      }
      el.innerHTML = `
        <span class="eyebrow plain">Your products</span>
        <div class="table-wrap mt-2">
          <table class="table">
            <thead><tr>
              <th>Name</th><th class="text-right">Price</th><th class="text-right">Stock</th><th class="text-right">Status</th>
            </tr></thead>
            <tbody>
              ${products.map(p => `<tr>
                <td>${Fmt.escape(p.name)}</td>
                <td class="text-right num">${Fmt.money(p.price, p.currency_code)}</td>
                <td class="text-right num">${p.stock}</td>
                <td class="text-right"><span class="badge badge-${p.status.replace('_', '')}">${p.status.replace('_', ' ')}</span></td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>`;
    } catch (err) { /* ignore */ }
  }

  // --- Activate card ---------------------------------------------------
  function renderActivateCard(me) {
    const ready = Boolean(me.bot_username && me.payout_wallet);
    return `<div class="activate-card">
      <span class="eyebrow plain" style="color:#888;justify-content:center;display:flex;">Step 5 · Launch</span>
      <h2 class="display mt-2">${ready ? 'Ready when you are.' : 'A few more steps first.'}</h2>
      <div class="lead">${ready
        ? 'Once activated, buyers can place orders through your bot and you\'ll receive settlements in USDC on Polygon.'
        : 'Complete the earlier steps — bot + wallet are required — and this will unlock.'}</div>
      <button class="btn btn-accent" id="activateBtn" ${ready ? '' : 'disabled'}>
        ${me.status === 'active' ? 'Already live' : 'Activate shop'}
      </button>
    </div>`;
  }

  function wireActivateCard(me) {
    const btn = document.getElementById('activateBtn');
    if (!btn || me.status === 'active') return;
    btn.addEventListener('click', async () => {
      btn.disabled = true;
      try {
        await API('POST', '/onboarding/activate');
        Toast.ok('Shop is live');
        setTimeout(() => { window.location.href = '/dashboard'; }, 900);
      } catch (err) {
        Toast.err(err.message);
        btn.disabled = false;
      }
    });
  }

  async function refreshMe() {
    try {
      const me = await API('GET', '/me');
      if (me.status === 'active') {
        window.location.href = '/dashboard';
        return;
      }
      renderOnboardingState(me);
    } catch (err) { Toast.err(err.message); }
  }
})();
</script>
</body>
</html>
