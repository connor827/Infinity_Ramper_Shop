  <text x="172" y="158" font-family="'Funnel Display','Helvetica Neue',Arial,sans-serif" font-weight="500" font-size="18" letter-spacing="2.2" fill="#bbbbbb">INFINITY RAMPER · WEB3 PAYMENT INFRASTRUCTURE</text>
