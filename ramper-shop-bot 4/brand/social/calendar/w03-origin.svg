<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="Why we built Infinity Ramper.">
  <title>Week 3 · Founder origin</title>
  <desc>Editorial quote card. A single statement explaining the motivation for building Ramper.</desc>
  <rect width="1600" height="900" fill="#f0ede6"/>
  <line x1="120" y1="130" x2="152" y2="130" stroke="#bbbbbb" stroke-width="1.5"/>
  <text x="172" y="136" font-family="'Funnel Display',sans-serif" font-weight="500" font-size="17" letter-spacing="2" fill="#bbbbbb">WHY WE BUILT THIS</text>

  <text x="120" y="340" font-family="'Funnel Display',serif" font-size="76" font-weight="500" letter-spacing="-3.04" fill="#0a0a0a">The problem isn't that</text>
  <text x="120" y="430" font-family="'Funnel Display',serif" font-size="76" font-weight="500" letter-spacing="-3.04" fill="#0a0a0a">merchants are risky.</text>
  <text x="120" y="570" font-family="'Funnel Display',serif" font-size="76" font-weight="300" font-style="italic" letter-spacing="-2.28" fill="#FFAC1C">It's that legacy rails</text>
  <text x="120" y="660" font-family="'Funnel Display',serif" font-size="76" font-weight="300" font-style="italic" letter-spacing="-2.28" fill="#FFAC1C">can't handle them.</text>

  <text x="120" y="780" font-family="'Funnel Display',serif" font-size="24" font-weight="400" letter-spacing="-0.72" fill="#555555">We built Infinity Ramper so that getting paid isn't contingent</text>
  <text x="120" y="815" font-family="'Funnel Display',serif" font-size="24" font-weight="400" letter-spacing="-0.72" fill="#555555">on whether a bank approves of your industry.</text>

  <text x="120" y="860" font-family="'IBM Plex Mono',monospace" font-size="15" fill="#bbbbbb">infinityramper.com</text>
</svg>
