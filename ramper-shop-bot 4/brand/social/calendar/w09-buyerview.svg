<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="What your buyer sees at checkout.">
  <title>Week 9 · Buyer checkout view</title>
  <desc>Mock hosted checkout card showing a familiar payment form — reassuring buyers it's just a card payment.</desc>
  <rect width="1600" height="900" fill="#f0ede6"/>

  <line x1="120" y1="130" x2="152" y2="130" stroke="#bbbbbb" stroke-width="1.5"/>
  <text x="172" y="136" font-family="'Funnel Display',sans-serif" font-weight="500" font-size="17" letter-spacing="2" fill="#bbbbbb">WHAT YOUR BUYER SEES</text>
  <text x="120" y="230" font-family="'Funnel Display',serif" font-size="68" font-weight="500" letter-spacing="-2.72" fill="#0a0a0a">Looks like checkout. <tspan font-weight="300" font-style="italic" fill="#FFAC1C">Settles on-chain.</tspan></text>
  <text x="120" y="300" font-family="'Funnel Display',serif" font-size="22" font-weight="400" letter-spacing="-0.66" fill="#555555">Your buyer has a normal card payment experience. No crypto wallet, no MetaMask, no friction.</text>

  <rect x="400" y="380" width="800" height="440" fill="#ffffff" stroke="#e8e5e0" stroke-width="1"/>

  <text x="440" y="430" font-family="'Funnel Display',sans-serif" font-size="13" letter-spacing="1.3" fill="#bbbbbb" font-weight="500">ORDER SUMMARY</text>
  <text x="440" y="470" font-family="'Funnel Display',sans-serif" font-size="18" fill="#0a0a0a">Aperture hoodie · Large</text>
  <text x="1160" y="470" font-family="'Funnel Display',sans-serif" font-size="18" fill="#0a0a0a" text-anchor="end">$84.00</text>

  <line x1="440" y1="500" x2="1160" y2="500" stroke="#e8e5e0" stroke-width="1"/>

  <text x="440" y="542" font-family="'Funnel Display',sans-serif" font-size="13" letter-spacing="1.3" fill="#bbbbbb" font-weight="500">PAY WITH</text>
  <rect x="440" y="560" width="168" height="56" fill="#0a0a0a" rx="4"/>
  <text x="524" y="596" font-family="'Funnel Display',sans-serif" font-size="16" fill="#f0ede6" font-weight="500" text-anchor="middle">Card</text>
  <rect x="618" y="560" width="168" height="56" fill="#ffffff" stroke="#e8e5e0" rx="4"/>
  <text x="702" y="596" font-family="'Funnel Display',sans-serif" font-size="16" fill="#555" text-anchor="middle">Apple Pay</text>
  <rect x="796" y="560" width="168" height="56" fill="#ffffff" stroke="#e8e5e0" rx="4"/>
  <text x="880" y="596" font-family="'Funnel Display',sans-serif" font-size="16" fill="#555" text-anchor="middle">Bank</text>
  <rect x="974" y="560" width="186" height="56" fill="#ffffff" stroke="#e8e5e0" rx="4"/>
  <text x="1067" y="596" font-family="'Funnel Display',sans-serif" font-size="16" fill="#555" text-anchor="middle">Crypto</text>

  <rect x="440" y="648" width="720" height="54" fill="#ffffff" stroke="#e8e5e0" rx="4"/>
  <text x="458" y="682" font-family="'IBM Plex Mono',monospace" font-size="16" fill="#888">4242 4242 4242 4242</text>

  <rect x="440" y="720" width="340" height="54" fill="#ffffff" stroke="#e8e5e0" rx="4"/>
  <text x="458" y="754" font-family="'IBM Plex Mono',monospace" font-size="16" fill="#888">MM / YY</text>
  <rect x="820" y="720" width="340" height="54" fill="#FFAC1C" rx="4"/>
  <text x="990" y="754" font-family="'Funnel Display',sans-serif" font-size="17" fill="#0a0a0a" font-weight="600" text-anchor="middle">Pay $84.00</text>

  <text x="120" y="860" font-family="'IBM Plex Mono',monospace" font-size="15" fill="#bbbbbb">infinityramper.com · hosted checkout preview</text>
</svg>
