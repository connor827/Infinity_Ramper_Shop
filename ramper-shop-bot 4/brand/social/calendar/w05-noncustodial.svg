<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="How non-custodial settlement works.">
  <title>Week 5 · Non-custodial architecture</title>
  <desc>Diagram showing payment flow from buyer through processor to merchant wallet, with Infinity Ramper drawn as a schema box (never holding funds).</desc>
  <rect width="1600" height="900" fill="#f0ede6"/>
  <line x1="120" y1="130" x2="152" y2="130" stroke="#bbbbbb" stroke-width="1.5"/>
  <text x="172" y="136" font-family="'Funnel Display',sans-serif" font-weight="500" font-size="17" letter-spacing="2" fill="#bbbbbb">NON-CUSTODIAL BY ARCHITECTURE</text>

  <text x="120" y="230" font-family="'Funnel Display',serif" font-size="68" font-weight="500" letter-spacing="-2.72" fill="#0a0a0a">We never hold your <tspan font-weight="300" font-style="italic" fill="#FFAC1C">money.</tspan></text>
  <text x="120" y="290" font-family="'Funnel Display',serif" font-size="22" font-weight="400" letter-spacing="-0.66" fill="#555555">Funds move from buyer to regulated processor to your wallet. We observe and route — we never take custody.</text>

  <rect x="120" y="420" width="280" height="200" fill="#ffffff" stroke="#e8e5e0" stroke-width="1"/>
  <text x="260" y="490" font-family="'Funnel Display',sans-serif" font-weight="500" font-size="26" letter-spacing="-0.78" fill="#0a0a0a" text-anchor="middle">Buyer</text>
  <text x="260" y="528" font-family="'Funnel Display',sans-serif" font-size="17" fill="#888" text-anchor="middle">Card · Apple Pay</text>
  <text x="260" y="552" font-family="'Funnel Display',sans-serif" font-size="17" fill="#888" text-anchor="middle">Bank · Crypto</text>

  <path d="M 400 520 L 490 520" stroke="#0a0a0a" stroke-width="1.5" fill="none"/>
  <path d="M 485 515 L 495 520 L 485 525" stroke="#0a0a0a" stroke-width="1.5" fill="none"/>

  <rect x="510" y="420" width="320" height="200" fill="#ffffff" stroke="#e8e5e0" stroke-width="1" stroke-dasharray="5 5"/>
  <text x="670" y="490" font-family="'Funnel Display',sans-serif" font-weight="500" font-size="26" letter-spacing="-0.78" fill="#0a0a0a" text-anchor="middle">Regulated processor</text>
  <text x="670" y="528" font-family="'Funnel Display',sans-serif" font-size="17" fill="#888" text-anchor="middle">MoonPay · Ramp</text>
  <text x="670" y="552" font-family="'Funnel Display',sans-serif" font-size="17" fill="#888" text-anchor="middle">Stripe · Coinbase</text>

  <path d="M 830 520 L 920 520" stroke="#0a0a0a" stroke-width="1.5" fill="none"/>
  <path d="M 915 515 L 925 520 L 915 525" stroke="#0a0a0a" stroke-width="1.5" fill="none"/>

  <rect x="940" y="420" width="280" height="200" fill="#ffffff" stroke="#FFAC1C" stroke-width="2"/>
  <text x="1080" y="490" font-family="'Funnel Display',sans-serif" font-weight="500" font-size="26" letter-spacing="-0.78" fill="#0a0a0a" text-anchor="middle">Your wallet</text>
  <text x="1080" y="528" font-family="'Funnel Display',sans-serif" font-size="17" fill="#888" text-anchor="middle">Polygon USDC</text>
  <text x="1080" y="552" font-family="'Funnel Display',sans-serif" font-size="17" fill="#888" text-anchor="middle">~10s later</text>

  <rect x="300" y="690" width="860" height="110" fill="none" stroke="#FFAC1C" stroke-width="1" stroke-dasharray="6 4"/>
  <text x="730" y="732" font-family="'Funnel Display',sans-serif" font-weight="500" font-size="19" letter-spacing="-0.38" fill="#FFAC1C" text-anchor="middle">INFINITY RAMPER · signals &amp; routes</text>
  <text x="730" y="762" font-family="'Funnel Display',sans-serif" font-size="17" fill="#555" text-anchor="middle">We connect the processor to your wallet.</text>
  <text x="730" y="785" font-family="'Funnel Display',sans-serif" font-size="17" fill="#555" text-anchor="middle">Funds never touch our infrastructure.</text>

  <text x="120" y="860" font-family="'IBM Plex Mono',monospace" font-size="15" fill="#bbbbbb">infinityramper.com</text>
</svg>
