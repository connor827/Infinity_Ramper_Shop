<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="From card tap to wallet in 10 seconds.">
  <title>Week 8 · Payment pipeline</title>
  <desc>Four-step horizontal pipeline showing payment journey: buyer pays, provider verifies, USDC conversion, wallet settlement, with elapsed times.</desc>
  <rect width="1600" height="900" fill="#f0ede6"/>

  <line x1="120" y1="130" x2="152" y2="130" stroke="#bbbbbb" stroke-width="1.5"/>
  <text x="172" y="136" font-family="'Funnel Display',sans-serif" font-weight="500" font-size="17" letter-spacing="2" fill="#bbbbbb">PAYMENT FLOW · END TO END</text>
  <text x="120" y="230" font-family="'Funnel Display',serif" font-size="68" font-weight="500" letter-spacing="-2.72" fill="#0a0a0a">From card tap to <tspan font-weight="300" font-style="italic" fill="#FFAC1C">wallet in 10s.</tspan></text>

  <rect x="120" y="340" width="1360" height="320" fill="#e8e5e0"/>
  <rect x="121" y="341" width="339" height="318" fill="#f0ede6"/>
  <rect x="461" y="341" width="339" height="318" fill="#f0ede6"/>
  <rect x="801" y="341" width="339" height="318" fill="#f0ede6"/>
  <rect x="1141" y="341" width="339" height="318" fill="#f0ede6"/>

  <text x="155" y="395" font-family="'IBM Plex Mono',monospace" font-size="14" fill="#bbbbbb">→</text>
  <text x="155" y="470" font-family="'Funnel Display',sans-serif" font-weight="500" font-size="26" letter-spacing="-0.78" fill="#0a0a0a">Buyer pays</text>
  <text x="155" y="510" font-family="'Funnel Display',sans-serif" font-size="16" fill="#888">Card · Apple Pay ·</text>
  <text x="155" y="534" font-family="'Funnel Display',sans-serif" font-size="16" fill="#888">Google Pay · Bank</text>
  <text x="155" y="630" font-family="'IBM Plex Mono',monospace" font-size="16" fill="#FFAC1C">0.0s</text>

  <text x="495" y="395" font-family="'IBM Plex Mono',monospace" font-size="14" fill="#bbbbbb">→</text>
  <text x="495" y="470" font-family="'Funnel Display',sans-serif" font-weight="500" font-size="26" letter-spacing="-0.78" fill="#0a0a0a">Provider verifies</text>
  <text x="495" y="510" font-family="'Funnel Display',sans-serif" font-size="16" fill="#888">FCA-regulated on-ramps</text>
  <text x="495" y="534" font-family="'Funnel Display',sans-serif" font-size="16" fill="#888">handle KYC/AML</text>
  <text x="495" y="630" font-family="'IBM Plex Mono',monospace" font-size="16" fill="#FFAC1C">~2s</text>

  <text x="835" y="395" font-family="'IBM Plex Mono',monospace" font-size="14" fill="#bbbbbb">→</text>
  <text x="835" y="470" font-family="'Funnel Display',sans-serif" font-weight="500" font-size="26" letter-spacing="-0.78" fill="#0a0a0a">USDC conversion</text>
  <text x="835" y="510" font-family="'Funnel Display',sans-serif" font-size="16" fill="#888">Best of 26 processors</text>
  <text x="835" y="534" font-family="'Funnel Display',sans-serif" font-size="16" fill="#888">selected automatically</text>
  <text x="835" y="630" font-family="'IBM Plex Mono',monospace" font-size="16" fill="#FFAC1C">~6s</text>

  <text x="1175" y="395" font-family="'IBM Plex Mono',monospace" font-size="14" fill="#bbbbbb">→</text>
  <text x="1175" y="470" font-family="'Funnel Display',sans-serif" font-weight="500" font-size="26" letter-spacing="-0.78" fill="#0a0a0a">Wallet settled</text>
  <text x="1175" y="510" font-family="'Funnel Display',sans-serif" font-size="16" fill="#888">USDC hits your Polygon</text>
  <text x="1175" y="534" font-family="'Funnel Display',sans-serif" font-size="16" fill="#888">wallet · final &amp; yours</text>
  <text x="1175" y="630" font-family="'IBM Plex Mono',monospace" font-size="16" fill="#FFAC1C">~10s</text>

  <text x="120" y="740" font-family="'Funnel Display',serif" font-size="22" font-weight="400" letter-spacing="-0.66" fill="#555555">Once confirmed on Polygon, a payment is cryptographically final.</text>
  <text x="120" y="774" font-family="'Funnel Display',serif" font-size="22" font-weight="400" letter-spacing="-0.66" fill="#555555">No chargebacks, no freezes, no reversals — ever.</text>

  <text x="120" y="860" font-family="'IBM Plex Mono',monospace" font-size="15" fill="#bbbbbb">infinityramper.com</text>
</svg>
